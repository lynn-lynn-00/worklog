<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkLog</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#f8f8f6;--surface:#ffffff;--surface2:#f2f1ee;--surface3:#e8e7e3;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#1c1b18;--text2:#6b6860;--text3:#a8a49e;
  --accent:#c084a0;--accent-light:#fceef5;--accent-dark:#a0607c;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* ── LOGIN ── */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,.06);}
.login-logo{font-size:40px;margin-bottom:12px;}
.login-title{font-size:24px;font-weight:700;margin-bottom:8px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px;line-height:1.7;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 24px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text);width:100%;transition:background .15s;}
.google-btn:hover{background:var(--surface2);}
.google-btn svg{width:18px;height:18px;flex-shrink:0;}
.demo-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:12px 24px;cursor:pointer;font-size:14px;font-weight:600;width:100%;margin-top:10px;transition:opacity .15s;}
.demo-btn:hover{opacity:.85;}
.login-note{font-size:11px;color:var(--text3);margin-top:10px;}

/* ── APP ── */
#app{display:none;flex-direction:column;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;height:52px;gap:12px;}
.topbar-title-wrap{display:flex;align-items:center;gap:6px;flex:1;}
.app-name{font-size:15px;font-weight:700;cursor:pointer;border-radius:6px;padding:2px 6px;transition:background .12s;}
.app-name:hover{background:var(--surface2);}
.app-name-input{font-size:15px;font-weight:700;border:none;outline:none;background:transparent;color:var(--text);width:120px;}
.save-status{font-size:11px;color:var(--text3);}
.user-pill{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0;}
.user-name{display:inline;}
.logout-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:var(--radius-sm);}
.logout-btn:hover{background:var(--surface2);}

/* ── MAIN LAYOUT ── */
.main{display:grid;grid-template-columns:1fr 320px;flex:1;min-height:0;}

/* ── LEFT ── */
.left-panel{padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;border-right:1px solid var(--border);}
.date-nav{display:flex;align-items:center;gap:8px;}
.nav-btn{width:30px;height:30px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:background .12s;line-height:1;}
.nav-btn:hover{background:var(--surface2);}
.date-label{font-size:14px;font-weight:600;flex:1;text-align:center;}
.today-btn{font-size:11px;padding:3px 10px;border:1px solid var(--border2);border-radius:20px;background:none;cursor:pointer;color:var(--text2);white-space:nowrap;}
.today-btn:hover{background:var(--surface2);}

.active-tag-bar{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--radius-sm);padding:8px 12px;}
.active-tag-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.active-tag-info{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0;}
.active-tag-name{font-weight:600;color:var(--text);font-size:13px;}
.active-tag-total{font-size:10px;color:var(--text3);}
.hint-text{font-size:11px;color:var(--text3);}

/* ── TIME GRID ── */
.time-grid{display:flex;flex-direction:column;}
.time-row{display:grid;grid-template-columns:44px 1fr;align-items:stretch;}
.hour-label{font-size:10px;color:var(--text3);text-align:right;padding-right:8px;padding-top:6px;line-height:1;flex-shrink:0;user-select:none;}
.hour-label.on-hour{color:var(--text2);font-weight:500;}
.slot{height:26px;background:var(--surface2);border-left:1px solid var(--border2);border-right:1px solid var(--border);border-top:1px solid var(--border);border-bottom:none;cursor:pointer;display:flex;align-items:center;padding:0 8px;overflow:hidden;white-space:nowrap;transition:opacity .1s;user-select:none;}
.slot.slot-top{border-top:1px solid var(--border2);border-radius:6px 6px 0 0;}
.slot.slot-bottom{border-bottom:1px solid var(--border2);border-radius:0 0 6px 6px;}
.slot.filled:hover{opacity:.8;}
.slot:not(.filled):hover{background:var(--surface3);}
.slot.merge-top{border-top-color:rgba(255,255,255,.2)!important;}
.slot-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.95);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* 18:00 divider */
.offhours-divider{display:flex;align-items:center;gap:10px;padding:10px 0 6px;}
.div-line{flex:1;height:1px;background:var(--border2);}
.div-text{font-size:11px;color:var(--text3);white-space:nowrap;}

/* overtime */
.overtime-add-row{display:grid;grid-template-columns:44px 1fr;align-items:center;}
.overtime-btn{height:26px;background:none;border:1px dashed var(--border2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:18px;font-weight:300;transition:all .15s;position:relative;}
.overtime-btn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.overtime-btn .ot-tooltip{display:none;position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100%+6px);background:var(--text);color:#fff;font-size:11px;font-weight:500;padding:5px 10px;border-radius:6px;white-space:nowrap;pointer-events:none;z-index:50;}
.overtime-btn:hover .ot-tooltip{display:block;}
.offhours-end{margin-top:10px;padding:12px 16px;border-radius:var(--radius);background:var(--surface2);border:1px dashed var(--border2);text-align:center;font-size:13px;color:var(--text2);}

/* ── RIGHT PANEL ── */
.right-panel{display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:12px 8px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{flex:1;overflow-y:auto;padding:14px;}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* ── TAGS ── */
.tag-group-header{display:flex;align-items:center;gap:6px;cursor:pointer;padding:5px 4px;margin:12px 0 5px;user-select:none;}
.tag-group-header:first-child{margin-top:0;}
.tgh-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);flex:1;}
.tgh-count{font-size:10px;background:var(--surface2);color:var(--text3);padding:1px 7px;border-radius:20px;}
.tgh-arrow{font-size:11px;color:var(--text3);transition:transform .2s;}
.tgh-arrow.closed{transform:rotate(-90deg);}
.tag-list{display:flex;flex-direction:column;gap:3px;}
.tag-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s;border:1.5px solid transparent;}
.tag-row:hover{background:var(--surface2);}
.tag-row.selected{background:var(--accent-light);border-color:var(--accent);}
.tag-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0;}
.tag-name-text{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tag-name-input{font-size:13px;flex:1;border:none;outline:none;background:transparent;color:var(--text);padding:0;min-width:0;}
.tag-actions{display:flex;gap:3px;opacity:0;transition:opacity .1s;flex-shrink:0;}
.tag-row:hover .tag-actions{opacity:1;}
.tag-action-btn{font-size:11px;padding:2px 7px;border:1px solid var(--border2);border-radius:4px;background:none;cursor:pointer;color:var(--text2);white-space:nowrap;}
.tag-action-btn:hover{background:var(--surface3);}
.tag-del-btn{width:22px;height:22px;border:1px solid var(--border2);border-radius:4px;background:none;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;padding:0;}
.tag-del-btn:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626;}
.tag-del-btn svg{width:12px;height:12px;}

.new-tag-form{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.form-label{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:2px;}
.form-input{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--accent);}
.color-row{display:flex;gap:6px;flex-wrap:wrap;}
.c-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s;}
.c-dot:hover{transform:scale(1.15);}
.c-dot.picked{border-color:var(--text);}
.add-tag-btn{padding:8px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:13px;color:var(--text);font-weight:600;transition:background .1s;}
.add-tag-btn:hover{background:var(--surface2);}

/* ── STATS ── */
.period-btns{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.period-btn{padding:5px 12px;border:1px solid var(--border2);border-radius:20px;background:none;cursor:pointer;font-size:12px;color:var(--text2);transition:all .12s;}
.period-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.custom-range{display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.custom-range input[type=date]{flex:1;min-width:110px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:12px;}
.custom-range span{font-size:12px;color:var(--text3);}
.apply-btn{padding:5px 12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:600;}
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;text-align:center;}
.stat-val{font-size:20px;font-weight:700;color:var(--text);}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;}
.chart-container{position:relative;width:200px;height:200px;margin:0 auto 14px;}
.no-data-msg{text-align:center;font-size:13px;color:var(--text3);padding:32px 0;}
.legend{display:flex;flex-direction:column;gap:6px;}
.leg-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.leg-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.leg-name{flex:1;color:var(--text2);}
.leg-val{font-weight:600;color:var(--text);}
.leg-pct{font-size:11px;color:var(--text3);}
.syncing{animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* delete confirm */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.confirm-box{background:var(--surface);border-radius:16px;padding:28px 24px;max-width:300px;width:100%;text-align:center;}
.confirm-title{font-size:15px;font-weight:700;margin-bottom:8px;}
.confirm-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
.confirm-btns{display:flex;gap:8px;}
.confirm-cancel{flex:1;padding:9px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:13px;color:var(--text2);}
.confirm-cancel:hover{background:var(--surface2);}
.confirm-delete{flex:1;padding:9px;border:none;border-radius:var(--radius-sm);background:#dc2626;cursor:pointer;font-size:13px;font-weight:600;color:#fff;}
.confirm-delete:hover{background:#b91c1c;}

/* ── RWD ── */
@media(max-width:680px){
  .main{grid-template-columns:1fr;grid-template-rows:1fr auto;}
  .right-panel{border-left:none;border-top:1px solid var(--border);max-height:55vh;}
  .left-panel{max-height:45vh;}
  .user-name{display:none;}
  .topbar{padding:0 12px;gap:8px;}
  .login-box{padding:36px 24px;}
  .stat-cards{grid-template-columns:1fr 1fr;}
}
@media(max-width:400px){
  .main{grid-template-rows:auto 1fr;}
  .left-panel{max-height:none;}
  .right-panel{max-height:none;}
  .topbar-title-wrap{min-width:0;}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🌸</div>
    <h1 class="login-title">WorkLog</h1>
    <p class="login-sub">以半小時為單位記錄工時<br>透過 Google 帳號安全儲存你的資料</p>
    <button class="google-btn" id="googleLoginBtn">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      使用 Google 帳號登入
    </button>
    <button class="demo-btn" id="demoBtn">試用示範模式（本機儲存）</button>
    <p class="login-note">資料儲存於 Google Drive 私人 AppData，不佔用你的空間</p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-title-wrap">
      <span id="appNameDisplay" class="app-name">🌸 WorkLog</span>
      <input id="appNameInput" class="app-name-input" style="display:none" maxlength="24">
    </div>
    <span class="save-status" id="saveStatus"></span>
    <div class="user-pill">
      <div class="user-avatar" id="userAvatar">?</div>
      <span class="user-name" id="userName"></span>
    </div>
    <button class="logout-btn" id="logoutBtn">登出</button>
  </div>

  <div class="main">
    <div class="left-panel">
      <div class="date-nav">
        <button class="nav-btn" id="prevDay">‹</button>
        <button class="today-btn" id="todayBtn">今天</button>
        <span class="date-label" id="dateLabel"></span>
        <button class="nav-btn" id="nextDay">›</button>
      </div>
      <div class="active-tag-bar">
        <div class="active-tag-swatch" id="activeTagSwatch"></div>
        <div class="active-tag-info">
          <span class="active-tag-name" id="activeTagName">請先選擇 tag</span>
          <span class="active-tag-total" id="activeTagTotal"></span>
        </div>
        <span class="hint-text">點選或拖曳填入時段</span>
      </div>
      <div class="time-grid" id="timeGrid"></div>
    </div>

    <div class="right-panel">
      <div class="tabs">
        <div class="tab active" data-tab="tags">Tag 管理</div>
        <div class="tab" data-tab="stats">統計圖表</div>
      </div>
      <div class="tab-content">
        <div class="tab-pane active" id="pane-tags">
          <div id="tagListContainer"></div>
          <div class="new-tag-form">
            <div><div class="form-label">新 Tag 名稱</div><input class="form-input" id="newTagName" placeholder="專案名稱…" maxlength="20"></div>
            <div><div class="form-label">顏色</div><div class="color-row" id="colorPicker"></div></div>
            <button class="add-tag-btn" id="addTagBtn">＋ 新增 Tag</button>
          </div>
        </div>
        <div class="tab-pane" id="pane-stats">
          <div class="period-btns">
            <button class="period-btn on" data-period="day">今日</button>
            <button class="period-btn" data-period="week">本週</button>
            <button class="period-btn" data-period="month">本月</button>
            <button class="period-btn" data-period="custom">自訂</button>
          </div>
          <div class="custom-range" id="customRange" style="display:none">
            <input type="date" id="rangeStart"><span>→</span><input type="date" id="rangeEnd">
            <button class="apply-btn" id="applyRange">套用</button>
          </div>
          <div class="stat-cards" id="statCards"></div>
          <div class="chart-container"><canvas id="pieChart" width="200" height="200"></canvas></div>
          <div class="legend" id="legend"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirm dialog -->
<div class="confirm-overlay" id="confirmOverlay" style="display:none">
  <div class="confirm-box">
    <div class="confirm-title">刪除專案</div>
    <div class="confirm-sub" id="confirmMsg"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" id="confirmCancel">取消</button>
      <button class="confirm-delete" id="confirmOk">確定刪除</button>
    </div>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────
const CLIENT_ID='115824433375-qfqhl4cs7t92fcvtrm340gr16atksc9b.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/drive.appdata';
const FILENAME='worklog-data-v2.json';
const WORK_START=9, WORK_END=18;

// 16-color palette derived from 粉嫩馬卡龍 + 清新森林, darkened for white-text readability
const COLORS=[
  '#7b8fe8', // 薰衣草紫
  '#e8607a', // 玫瑰紅
  '#e8904a', // 橘橙
  '#e8c030', // 向日葵黃
  '#5ec47a', // 嫩草綠
  '#1aaa88', // 薄荷翠
  '#0e8f6c', // 森林深綠
  '#3aa8c8', // 天空藍
  '#5b78d4', // 靛藍
  '#a055d8', // 葡萄紫
  '#d858a8', // 桃紅紫
  '#d46858', // 磚紅
  '#58a898', // 青瓷
  '#c87e30', // 琥珀橘
  '#6ab84a', // 萊姆綠
  '#8868c0', // 紫羅蘭
];

// ── State ──────────────────────────────────────────────
let state={
  appName:'🌸 WorkLog',
  tags:[
    {name:'產品開發',color:'#7c6f9f',ended:false},
    {name:'週會',color:'#5b8fa8',ended:false},
    {name:'UI 設計',color:'#6aaa8a',ended:false},
  ],
  entries:{}
};
let activeTag=state.tags[0];
let currentDate=new Date();
let viewPeriod='day',customStart=null,customEnd=null;
let isDragging=false,dragFill=null;
let pieChartInst=null,pickedColor=COLORS[0];
let saveTimeout=null,isGoogleUser=false,googleAccessToken=null,driveFileId=null;
let activeCollapsed=false,endedCollapsed=true;
let overtimeSlots=0; // extra slots after 18:00
let pendingDeleteTag=null;

// ── Helpers ────────────────────────────────────────────
const dateKey=d=>d.toISOString().slice(0,10);
const fmt=d=>d.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
function weekDates(d){const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);const m=new Date(d);m.setDate(diff);return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return dateKey(x);});}
function monthDates(d){const y=d.getFullYear(),mo=d.getMonth();return Array.from({length:new Date(y,mo+1,0).getDate()},(_,i)=>dateKey(new Date(y,mo,i+1)));}
function rangeDates(s,e){const ds=[];const c=new Date(s);while(c<=e){ds.push(dateKey(new Date(c)));c.setDate(c.getDate()+1);}return ds;}
function slotToMinutes(sk){const[h,m]=sk.split(':').map(Number);return h*60+m;}
function minutesToSlot(m){return Math.floor(m/60)+':'+(m%60===0?'00':'30');}

// ── Save / Load ────────────────────────────────────────
async function gDriveLoad(){
  try{
    const list=await fetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name="'+FILENAME+'"',{headers:{Authorization:'Bearer '+googleAccessToken}}).then(r=>r.json());
    if(list.files&&list.files.length>0){
      driveFileId=list.files[0].id;
      const data=await fetch('https://www.googleapis.com/drive/v3/files/'+driveFileId+'?alt=media',{headers:{Authorization:'Bearer '+googleAccessToken}}).then(r=>r.json());
      if(data&&data.tags){state=data;if(!state.appName)state.appName='🌸 WorkLog';if(!state.entries)state.entries={};}
    }
  }catch(e){console.warn('Drive load failed',e);}
}
async function gDriveSave(){
  if(!isGoogleUser||!googleAccessToken){localSave();return;}
  setSaveStatus('儲存中…',true);
  try{
    const body=JSON.stringify(state);
    if(driveFileId){
      await fetch('https://www.googleapis.com/upload/drive/v3/files/'+driveFileId+'?uploadType=media',{method:'PATCH',headers:{Authorization:'Bearer '+googleAccessToken,'Content-Type':'application/json'},body});
    }else{
      const meta=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:'Bearer '+googleAccessToken,'Content-Type':'application/json'},body:JSON.stringify({name:FILENAME,parents:['appDataFolder']})}).then(r=>r.json());
      driveFileId=meta.id;
      await fetch('https://www.googleapis.com/upload/drive/v3/files/'+driveFileId+'?uploadType=media',{method:'PATCH',headers:{Authorization:'Bearer '+googleAccessToken,'Content-Type':'application/json'},body});
    }
    setSaveStatus('已同步 ✓');
  }catch(e){setSaveStatus('同步失敗');localSave();}
}
function localSave(){localStorage.setItem(LS_STATE,JSON.stringify(state));setSaveStatus('已儲存 ✓');}
function scheduleSave(){clearTimeout(saveTimeout);setSaveStatus('待儲存…');saveTimeout=setTimeout(isGoogleUser?gDriveSave:localSave,1200);}
function setSaveStatus(txt,syncing=false){
  const el=document.getElementById('saveStatus');el.textContent=txt;
  el.className='save-status'+(syncing?' syncing':'');
  if(!syncing)setTimeout(()=>{if(el.textContent===txt)el.textContent='';},3000);
}

// ── Auth ───────────────────────────────────────────────
const LS_MODE='worklog_login_mode'; // 'google' | 'demo'
const LS_STATE='worklog_state_v2';

// On page load: restore session automatically
(function restoreSession(){
  const mode=localStorage.getItem(LS_MODE);
  if(mode==='demo'){
    // Demo mode: load local data and skip login screen
    loadLocalState();
    initApp('示範模式','示');
    renderAll();
  } else if(mode==='google'){
    // Google mode: silently try to get a token without UX popup
    if(!window.google){
      // SDK not ready yet — wait for it
      window.addEventListener('load',()=>silentGoogleRestore());
    } else {
      silentGoogleRestore();
    }
  }
  // else: no saved mode → show login screen (first visit)
})();

function silentGoogleRestore(){
  // Try silent token grant (prompt:'none') — works if user has active Google session
  try{
    const client=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,scope:SCOPES,prompt:'',
      callback:async(resp)=>{
        if(resp.error){
          // Silent grant failed → show login screen so user can re-auth
          console.log('Silent restore failed:',resp.error);
          localStorage.removeItem(LS_MODE);
          return;
        }
        googleAccessToken=resp.access_token;isGoogleUser=true;
        const info=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+resp.access_token}}).then(r=>r.json()).catch(()=>({name:'使用者'}));
        initApp(info.name||info.email||'使用者',(info.name||'U')[0].toUpperCase());
        await gDriveLoad();
        renderAll();
      }
    });
    client.requestAccessToken({prompt:''});
  }catch(e){
    console.log('silentGoogleRestore error',e);
    localStorage.removeItem(LS_MODE);
  }
}

function loadLocalState(){
  const saved=localStorage.getItem(LS_STATE);
  if(saved)try{const d=JSON.parse(saved);if(d&&d.tags){state=d;if(!state.appName)state.appName='🌸 WorkLog';}}catch(e){}
}

document.getElementById('googleLoginBtn').addEventListener('click',()=>{
  if(!window.google){alert('Google SDK 尚未載入，請稍後再試或使用試用模式');return;}
  const client=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:async(resp)=>{
      if(resp.error)return;
      googleAccessToken=resp.access_token;isGoogleUser=true;
      localStorage.setItem(LS_MODE,'google');
      const info=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+resp.access_token}}).then(r=>r.json()).catch(()=>({name:'使用者'}));
      initApp(info.name||info.email||'使用者',(info.name||'U')[0].toUpperCase());
      await gDriveLoad();renderAll();
    }
  });
  client.requestAccessToken();
});

// ── Grid ──────────────────────────────────────────────
function buildSlotList(){
  const slots=[];
  for(let h=WORK_START;h<WORK_END;h++){
    slots.push({h,half:0,key:h+':00',overtime:false});
    slots.push({h,half:1,key:h+':30',overtime:false});
  }
  // overtime: each overtimeSlots step is 30min
  for(let i=0;i<overtimeSlots;i++){
    const mins=WORK_END*60+i*30;
    const h=Math.floor(mins/60),half=mins%60===0?0:1;
    slots.push({h,half,key:h+':'+(half===0?'00':'30'),overtime:true});
  }
  return slots;
}

function renderGrid(){
  document.getElementById('dateLabel').textContent=fmt(currentDate);
  const grid=document.getElementById('timeGrid');grid.innerHTML='';
  const k=dateKey(currentDate);
  const day=state.entries[k]||{};
  const slots=buildSlotList();
  const workSlots=slots.filter(s=>!s.overtime);
  const otSlots=slots.filter(s=>s.overtime);
  const total=slots.length;

  // render work slots
  workSlots.forEach((s,idx)=>{
    const row=makeSlotRow(s,idx,0,workSlots.length-1,day,k,true);
    grid.appendChild(row);
  });

  // 18:00 divider
  const divider=document.createElement('div');
  divider.className='offhours-divider';
  divider.innerHTML='<div class="div-line"></div><span class="div-text">18:00 下班時間</span><div class="div-line"></div>';
  grid.appendChild(divider);

  // overtime slots
  otSlots.forEach((s,idx)=>{
    const row=makeSlotRow(s,idx,0,otSlots.length-1,day,k,false);
    grid.appendChild(row);
  });

  // Add overtime button
  const addRow=document.createElement('div');
  addRow.className='overtime-add-row';
  const nextMins=WORK_END*60+overtimeSlots*30;
  const nextH=Math.floor(nextMins/60);
  const nextHalf=nextMins%60===0?'00':'30';
  const lbl=document.createElement('div');lbl.className='hour-label on-hour';lbl.textContent=nextH+':'+nextHalf;
  const btn=document.createElement('button');btn.className='overtime-btn';
  btn.innerHTML='<span class="ot-tooltip">確定要加班嗎？加班對身體不好 💪</span>＋';
  btn.addEventListener('click',()=>{overtimeSlots++;renderGrid();});
  addRow.appendChild(lbl);addRow.appendChild(btn);
  grid.appendChild(addRow);

  if(otSlots.length===0){
    const end=document.createElement('div');end.className='offhours-end';
    end.innerHTML='🌙 下班摟！明天繼續加油～';
    grid.appendChild(end);
  }
}

function makeSlotRow(s,idx,firstIdx,lastIdx,day,k,isWork){
  const row=document.createElement('div');row.className='time-row';
  const lbl=document.createElement('div');
  lbl.className='hour-label'+(s.half===0?' on-hour':'');
  lbl.textContent=s.half===0?(s.h+':00'):'';
  row.appendChild(lbl);

  const slot=document.createElement('div');slot.className='slot';
  if(idx===firstIdx)slot.classList.add('slot-top');
  if(idx===lastIdx)slot.classList.add('slot-bottom');

  const filledTag=day[s.key]||null;
  const allSlots=buildSlotList();
  const globalIdx=allSlots.findIndex(x=>x.key===s.key);
  const prevKey=globalIdx>0?allSlots[globalIdx-1].key:null;
  const prevTag=prevKey?(day[prevKey]||null):null;

  if(filledTag){
    const tagObj=state.tags.find(t=>t.name===filledTag);
    slot.style.background=tagObj?tagObj.color:'#888';
    slot.classList.add('filled');
    if(prevTag===filledTag)slot.classList.add('merge-top');
    if(prevTag!==filledTag){
      const lb=document.createElement('span');lb.className='slot-label';lb.textContent=filledTag;slot.appendChild(lb);
    }
  }
  slot.addEventListener('mousedown',e=>{
    e.preventDefault();isDragging=true;
    dragFill=(filledTag===(activeTag?.name))?null:(activeTag?.name||null);
    applySlot(k,s.key,dragFill);
  });
  slot.addEventListener('mouseenter',()=>{if(isDragging)applySlot(k,s.key,dragFill);});
  row.appendChild(slot);
  return row;
}
document.addEventListener('mouseup',()=>{isDragging=false;dragFill=null;});

function applySlot(k,sk,tagName){
  if(!state.entries[k])state.entries[k]={};
  if(tagName)state.entries[k][sk]=tagName;
  else delete state.entries[k][sk];
  if(Object.keys(state.entries[k]).length===0)delete state.entries[k];
  scheduleSave();renderGrid();renderChart();updateActiveTagBar();
}

// ── Tags ──────────────────────────────────────────────
function renderTags(){
  const container=document.getElementById('tagListContainer');container.innerHTML='';
  const active=state.tags.filter(t=>!t.ended);
  const ended=state.tags.filter(t=>t.ended);

  function makeGroup(label,tags,isEnded,collapsed,onToggle){
    if(tags.length===0&&isEnded)return;
    const header=document.createElement('div');header.className='tag-group-header';
    const lbl=document.createElement('span');lbl.className='tgh-label';lbl.textContent=label;
    const cnt=document.createElement('span');cnt.className='tgh-count';cnt.textContent=tags.length;
    const arrow=document.createElement('span');arrow.className='tgh-arrow'+(collapsed?' closed':'');arrow.textContent='▾';
    header.appendChild(lbl);header.appendChild(cnt);header.appendChild(arrow);
    header.addEventListener('click',onToggle);
    container.appendChild(header);
    if(collapsed)return;
    const list=document.createElement('div');list.className='tag-list';
    tags.forEach(tag=>list.appendChild(makeTagRow(tag,isEnded)));
    container.appendChild(list);
  }

  makeGroup('進行中專案',active,false,activeCollapsed,()=>{activeCollapsed=!activeCollapsed;renderTags();});
  makeGroup('已結束專案',ended,true,endedCollapsed,()=>{endedCollapsed=!endedCollapsed;renderTags();});
  updateActiveTagBar();
}

function makeTagRow(tag,isEnded){
  const row=document.createElement('div');
  row.className='tag-row'+(activeTag&&activeTag.name===tag.name?' selected':'');
  const dot=document.createElement('div');dot.className='tag-dot';dot.style.background=tag.color;

  const nm=document.createElement('span');nm.className='tag-name-text';nm.textContent=tag.name;
  // Use native dblclick — avoids conflict with row single-click re-render
  nm.addEventListener('dblclick',e=>{e.stopPropagation();startEditTagName(tag,nm);});
  nm.title='雙擊編輯名稱';

  const acts=document.createElement('div');acts.className='tag-actions';

  if(!isEnded){
    const endBtn=document.createElement('button');endBtn.className='tag-action-btn';endBtn.textContent='結束專案';
    endBtn.addEventListener('click',e=>{e.stopPropagation();tag.ended=true;endedCollapsed=false;scheduleSave();renderTags();renderChart();});
    acts.appendChild(endBtn);
  }else{
    const revBtn=document.createElement('button');revBtn.className='tag-action-btn';revBtn.textContent='恢復';
    revBtn.addEventListener('click',e=>{e.stopPropagation();tag.ended=false;scheduleSave();renderTags();renderChart();});
    acts.appendChild(revBtn);
  }

  // Delete button (trash icon)
  const delBtn=document.createElement('button');delBtn.className='tag-del-btn';
  delBtn.innerHTML='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M6 4V2h4v2M5 4v9a1 1 0 001 1h4a1 1 0 001-1V4"/><line x1="7" y1="7" x2="7" y2="10"/><line x1="9" y1="7" x2="9" y2="10"/></svg>';
  delBtn.title='刪除';
  delBtn.addEventListener('click',e=>{e.stopPropagation();showDeleteConfirm(tag);});
  acts.appendChild(delBtn);

  // Edit pencil button — always visible alternative to dblclick
  const editBtn=document.createElement('button');editBtn.className='tag-action-btn';editBtn.textContent='✏️';
  editBtn.title='編輯名稱';editBtn.style.fontSize='12px';editBtn.style.padding='2px 5px';
  editBtn.addEventListener('click',e=>{e.stopPropagation();startEditTagName(tag,nm);});
  acts.insertBefore(editBtn,acts.firstChild);

  row.appendChild(dot);row.appendChild(nm);row.appendChild(acts);
  row.addEventListener('click',()=>{
    activeTag=tag;updateActiveTagBar();
    // Only update selection highlight, don't full re-render (avoids killing edit state)
    document.querySelectorAll('.tag-row').forEach(r=>r.classList.remove('selected'));
    row.classList.add('selected');
    renderGrid();
  });
  return row;
}

function startEditTagName(tag,nmEl){
  if(nmEl._editing) return;
  nmEl._editing=true;
  const input=document.createElement('input');
  input.className='tag-name-input';input.value=tag.name;input.maxLength=20;
  nmEl.style.display='none';
  nmEl.parentNode.insertBefore(input,nmEl);
  input.focus();input.select();
  function done(){
    const v=input.value.trim();
    if(v&&v!==tag.name){
      Object.keys(state.entries).forEach(k=>{
        Object.keys(state.entries[k]).forEach(s=>{if(state.entries[k][s]===tag.name)state.entries[k][s]=v;});
      });
      if(activeTag&&activeTag.name===tag.name)activeTag.name=v;
      tag.name=v;scheduleSave();renderGrid();renderChart();updateActiveTagBar();
    }
    input.remove();nmEl.style.display='';nmEl.textContent=tag.name;nmEl._editing=false;
  }
  input.addEventListener('blur',done);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')input.blur();if(e.key==='Escape'){input.value=tag.name;input.blur();}});
  input.addEventListener('click',e=>e.stopPropagation());
  input.addEventListener('mousedown',e=>e.stopPropagation());
}

function updateActiveTagBar(){
  document.getElementById('activeTagSwatch').style.background=activeTag?.color||'#ccc';
  document.getElementById('activeTagName').textContent=activeTag?.name||'請先選擇 tag';
  const totalEl=document.getElementById('activeTagTotal');
  if(activeTag){
    let count=0;
    Object.values(state.entries).forEach(day=>{Object.values(day).forEach(t=>{if(t===activeTag.name)count++;});});
    totalEl.textContent=count>0?'累計工時：'+(count*0.5).toFixed(1)+' 小時':'尚無記錄';
  }else{
    totalEl.textContent='';
  }
}

function showDeleteConfirm(tag){
  pendingDeleteTag=tag;

}
document.getElementById('confirmCancel').addEventListener('click',()=>{pendingDeleteTag=null;document.getElementById('confirmOverlay').style.display='none';});
document.getElementById('confirmOk').addEventListener('click',()=>{
  if(!pendingDeleteTag)return;
  const name=pendingDeleteTag.name;
  state.tags=state.tags.filter(t=>t.name!==name);
  Object.keys(state.entries).forEach(k=>{Object.keys(state.entries[k]).forEach(s=>{if(state.entries[k][s]===name)delete state.entries[k][s];});});
  if(activeTag&&activeTag.name===name)activeTag=state.tags.find(t=>!t.ended)||state.tags[0]||null;
  pendingDeleteTag=null;
  document.getElementById('confirmOverlay').style.display='none';
  scheduleSave();renderTags();renderGrid();renderChart();
});

// ── Stats ─────────────────────────────────────────────
function getKeys(){
  if(viewPeriod==='day')return[dateKey(currentDate)];
  if(viewPeriod==='week')return weekDates(currentDate);
  if(viewPeriod==='month')return monthDates(currentDate);
  if(viewPeriod==='custom'&&customStart&&customEnd)return rangeDates(customStart,customEnd);
  return[dateKey(currentDate)];
}
function aggregate(keys){const c={};keys.forEach(k=>{const d=state.entries[k]||{};Object.values(d).forEach(t=>{if(t)c[t]=(c[t]||0)+1;});});return c;}

function renderChart(){
  const keys=getKeys();const counts=aggregate(keys);const total=Object.values(counts).reduce((a,b)=>a+b,0);const days=keys.length;
  document.getElementById('statCards').innerHTML=`
    <div class="stat-card"><div class="stat-val">${(total*0.5).toFixed(1)}h</div><div class="stat-lbl">總工時</div></div>
    <div class="stat-card"><div class="stat-val">${days}天</div><div class="stat-lbl">統計天數</div></div>
    <div class="stat-card"><div class="stat-val">${Object.keys(counts).length}</div><div class="stat-lbl">使用 Tag</div></div>
    <div class="stat-card"><div class="stat-val">${days>0?(total*0.5/days).toFixed(1):0}h</div><div class="stat-lbl">日均工時</div></div>`;
  const leg=document.getElementById('legend');
  if(!total){
    leg.innerHTML='<div class="no-data-msg">此期間尚無紀錄 ✨</div>';
    if(pieChartInst){pieChartInst.destroy();pieChartInst=null;}
    const ctx=document.getElementById('pieChart').getContext('2d');
    pieChartInst=new Chart(ctx,{type:'doughnut',data:{labels:['(無資料)'],datasets:[{data:[1],backgroundColor:['#ececec'],borderWidth:0}]},options:{responsive:false,plugins:{legend:{display:false},tooltip:{enabled:false}},cutout:'60%'}});
    return;
  }
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const labels=sorted.map(e=>e[0]);const values=sorted.map(e=>e[1]);
  const bgColors=labels.map(l=>{const t=state.tags.find(x=>x.name===l);return t?t.color:'#888';});
  const ctx=document.getElementById('pieChart').getContext('2d');
  if(pieChartInst)pieChartInst.destroy();
  pieChartInst=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:bgColors,borderWidth:3,borderColor:'#ffffff'}]},options:{responsive:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${(c.raw*0.5).toFixed(1)}h`}}},cutout:'58%',animation:{duration:350}}});
  leg.innerHTML='';
  sorted.forEach(([name,cnt])=>{
    const tag=state.tags.find(t=>t.name===name);
    const row=document.createElement('div');row.className='leg-row';
    const sw=document.createElement('div');sw.className='leg-swatch';sw.style.background=tag?tag.color:'#888';
    const nm=document.createElement('span');nm.className='leg-name';nm.textContent=name+(tag?.ended?' (已結束)':'');
    const val=document.createElement('span');val.className='leg-val';val.textContent=`${(cnt*0.5).toFixed(1)}h`;
    const pct=document.createElement('span');pct.className='leg-pct';pct.textContent=`${Math.round(cnt/total*100)}%`;
    row.appendChild(sw);row.appendChild(nm);row.appendChild(val);row.appendChild(pct);leg.appendChild(row);
  });
}

    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');document.getElementById('pane-'+tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='stats')renderChart();
  });
});

function renderAll(){renderTags();renderColorPicker();renderGrid();renderChart();}
const today=new Date().toISOString().slice(0,10);
document.getElementById('rangeStart').value=today;
document.getElementById('rangeEnd').value=today;
</script>
